resources:
  jobs:
    weather_analytics_job:
      name: weather_analytics_job

      tasks:
        - task_key: bronze_ingestion
          python_wheel_task:
            package_name: weather_analytics
            entry_point: weather-bronze

          environment_key: weather_environment

        - task_key: silver_processing
          depends_on:
            - task_key: bronze_ingestion

          python_wheel_task:
            package_name: weather_analytics
            entry_point: weather-silver

          environment_key: weather_environment

      environments:
        - environment_key: weather_environment
          spec:
            dependencies:
              - ../../dist/weather_analytics-0.1.0-py3-none-any.whl
            environment_version: "4"